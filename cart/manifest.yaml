# ConfigMap
apiVersion: v1
kind: ConfigMap
metadata:
  name: cart
  namespace: roboshop
  labels:
    component: cart
    project: roboshop
    tier: application

data:
  REDIS_HOST: "redis"
  CATALOGUE_HOST: "catalogue"
  CATALOGUE_PORT: "8080"

---
# Deployment
apiVersion: apps/v1
kind: Deployment
metadata:
  name: cart
  namespace: roboshop

  labels:
    component: cart
    project: roboshop
    tier: application

spec:
  replicas: 1

  selector:
    matchLabels:
      component: cart
      project: roboshop
      tier: application

  template:
    metadata:
      labels:
        component: cart
        project: roboshop
        tier: application

    spec:
      containers:
      - name: cart
        image: sangala2025/cart:v1

        ports:
        - containerPort: 8080

        envFrom:
        - configMapRef:
            name: cart

---
# Service
apiVersion: v1
kind: Service
metadata:
  name: cart
  namespace: roboshop

  labels:
    component: cart
    project: roboshop
    tier: application

spec:
  type: ClusterIP

  selector:
    component: cart
    project: roboshop
    tier: application

  ports:
  - protocol: TCP
    port: 8080
    targetPort: 8080