# rabbitmq deployment
apiVersion: apps/v1
kind: Deployment
metadata:
  name: rabbitmq
  namespace: roboshop

  labels:
    component: rabbitmq
    project: roboshop
    tier: database

spec:
  replicas: 1

  selector:
    matchLabels:
      component: rabbitmq
      project: roboshop
      tier: database

  template:
    metadata:
      labels:
        component: rabbitmq
        project: roboshop
        tier: database

    spec:
      containers:
      - name: rabbitmq
        image: sangala2025/rabbitmq:v1

---
# rabbitmq service (cluster internal)
apiVersion: v1
kind: Service
metadata:
  name: rabbitmq
  namespace: roboshop

  labels:
    component: rabbitmq
    project: roboshop
    tier: database

spec:

  selector:
    component: rabbitmq
    project: roboshop
    tier: database

  ports:
  - protocol: TCP
    port: 27017
    targetPort: 27017