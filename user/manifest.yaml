apiVersion: v1
kind: ConfigMap
metadata:
  name: user
  namespace: roboshop
  labels:
    component: catalouge
    project: roboshop
    tire: application
data:
  MONGO: "true" 
  REDIS_URL: 'redis://redis:6379' 
  MONGO_URL: "mongodb://mongodb:27017/users"

---
apiVersion: apps/v1
kind: deployment
metadata:
  name: user
  namespace: roboshop
  # deployment labels
  labels:
    component: user
    project: roboshop
    tire: application
spec:
  replicas: 1   # These are the labels replica set use to create pod replicas, this should match pod labels
  selector:
    matchLabels:
      component: user
      project: roboshop
      tire: application
    # This is pod definition
    template:
      metadata:
        labels:
          component: user
          project: roboshop
          tire: application
  spec:
    containers:
      - name: user
        image: sangala2025/user:v1
    envFrom:
      - configMapRef:
          name: user
---
apiVersion: v1
kind: Service
metadata:
  name: user
  namespace: roboshop

  labels: 
    component: user
    project: roboshop 
    tire: application
spec:
  selectors:
    component: user
    project: roboshop 
    tire: application
  ports:
    - protocol: TCP
      port: 8080 #service port
      targetPort: 8080 #container port
