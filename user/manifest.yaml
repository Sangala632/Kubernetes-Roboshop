# ConfigMap
apiVersion: v1
kind: ConfigMap
metadata:
  name: user
  namespace: roboshop

  labels:
    component: user
    project: roboshop
    tier: application

data:
  MONGO: "true"
  REDIS_URL: "redis://redis:6379"
  MONGO_URL: "mongodb://mongodb:27017/users"

---
# Deployment
apiVersion: apps/v1
kind: Deployment
metadata:
  name: user
  namespace: roboshop

  labels:
    component: user
    project: roboshop
    tier: application

spec:
  replicas: 1

  selector:
    matchLabels:
      component: user
      project: roboshop
      tier: application

  template:
    metadata:
      labels:
        component: user
        project: roboshop
        tier: application

    spec:
      containers:
      - name: user
        image: sangala2025/user:v1

        ports:
        - containerPort: 8080

        envFrom:
        - configMapRef:
            name: user

---
# Service
apiVersion: v1
kind: Service
metadata:
  name: user
  namespace: roboshop

  labels:
    component: user
    project: roboshop
    tier: application

spec:
  type: ClusterIP

  selector:
    component: user
    project: roboshop
    tier: application

  ports:
  - protocol: TCP
    port: 8080
    targetPort: 8080