# mongodb deployment
apiVersion: apps/v1
kind: Deployment
metadata:
  name: mongodb
  namespace: roboshop

  labels:
    component: mongodb
    project: roboshop
    tier: database

spec:
  replicas: 1

  selector:
    matchLabels:
      component: mongodb
      project: roboshop
      tier: database

  template:
    metadata:
      labels:
        component: mongodb
        project: roboshop
        tier: database

    spec:
      containers:
      - name: mongodb
        image: sangala2025/mongodb:v1

        ports:
        - containerPort: 27017

---
# mongodb service (cluster internal)
apiVersion: v1
kind: Service
metadata:
  name: mongodb
  namespace: roboshop

  labels:
    component: mongodb
    project: roboshop
    tier: database

spec:
  type: ClusterIP

  selector:
    component: mongodb
    project: roboshop
    tier: database

  ports:
  - protocol: TCP
    port: 27017
    targetPort: 27017