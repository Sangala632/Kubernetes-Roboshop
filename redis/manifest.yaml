# redis deployment
apiVersion: apps/v1
kind: Deployment
metadata:
  name: redis
  namespace: roboshop

  labels:
    component: redis
    project: roboshop
    tier: database

spec:
  replicas: 1

  selector:
    matchLabels:
      component: redis
      project: roboshop
      tier: database

  template:
    metadata:
      labels:
        component: redis
        project: roboshop
        tier: database

    spec:
      containers:
      - name: redis
        image: sangala2025/redis:v1

        ports:
        - containerPort: 6379

---
# redis service
apiVersion: v1
kind: Service
metadata:
  name: redis
  namespace: roboshop

  labels:
    component: redis
    project: roboshop
    tier: database

spec:

  selector:
    component: redis
    project: roboshop
    tier: database

  ports:
  - protocol: TCP
    port: 6379
    targetPort: 6379