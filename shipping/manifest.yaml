# ConfigMap
apiVersion: v1
kind: ConfigMap
metadata:
  name: shipping
  namespace: roboshop
  # deployment labels
  labels:
    component: shipping
    project: roboshop
    tier: application

data:
  CART_ENDPOINT: cart:8080 
  DB_HOST: mysql


---
# Deployment
apiVersion: apps/v1
kind: Deployment
metadata:
  name: shipping
  namespace: roboshop

  labels:
    component: shipping
    project: roboshop
    tier: application

spec:
  replicas: 1
# These are the labels replica set use to create pod replicas, this should match pod labels
  selector:
    matchLabels:
      component: shipping
      project: roboshop
      tier: application
  # This is pod definition
  template:
    metadata:
      labels:
        component: shipping
        project: roboshop
        tier: application

    spec:
      containers:
      - name: shipping
        image: sangala2025/shipping:v1

        ports:
        - containerPort: 8080

        envFrom:
        - configMapRef:
            name: shipping

---
# Service
apiVersion: v1
kind: Service
metadata:
  name: shipping
  namespace: roboshop

  labels:
    component: shipping
    project: roboshop
    tier: application

spec:
  type: ClusterIP

  selector:
    component: shipping
    project: roboshop
    tier: application

  ports:
  - protocol: TCP
    port: 8080 # service port
    targetPort: 8080 # container port